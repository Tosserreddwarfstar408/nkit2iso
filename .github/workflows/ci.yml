name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: gofmt (syntax/format gate)
        run: test -z "$(gofmt -l .)" || { echo 'Run gofmt:'; gofmt -l .; exit 1; }
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
